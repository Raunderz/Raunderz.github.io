<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rounders</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Rounders — Modular systems and experimental projects.">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #ffffff;
            --text: #111111;
            --muted: #777777;
            --border: #e0e0e0;
            --dim: #555555;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0a0a0a;
                --text: #d0d0d0;
                --muted: #888888;
                --border: #222222;
                --dim: #999999;
            }
        }

        html {
            font-family: "SF Mono", "Menlo", "Consolas", monospace;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        body {
            max-width: 640px;
            margin: 0 auto;
            padding: 4rem 1.5rem 3rem;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            margin-bottom: 4rem;
        }

        .org-name {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.25em;
            color: var(--muted);
            margin-bottom: 2rem;
        }

        .mark {
            width: 96px;
            height: 96px;
            margin-bottom: 2rem;
        }

        main {
            flex: 1;
        }

        .statement {
            font-size: 0.85rem;
            color: var(--muted);
            line-height: 1.8;
            margin-bottom: 3rem;
            max-width: 480px;
        }

        .project {
            display: block;
            padding: 1.25rem 0;
            border-top: 1px solid var(--border);
            text-decoration: none;
            color: var(--text);
            transition: opacity 0.15s;
        }

        .project:hover {
            opacity: 0.6;
        }

        .project:last-child {
            border-bottom: 1px solid var(--border);
        }

        .project-header {
            display: flex;
            align-items: baseline;
            gap: 1rem;
            margin-bottom: 0.35rem;
        }

        .project-name {
            font-size: 0.95rem;
            font-weight: 600;
        }

        .project-status {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--muted);
        }

        .project-desc {
            font-size: 0.8rem;
            color: var(--dim);
            line-height: 1.5;
        }

        footer {
            margin-top: 4rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
            font-size: 0.65rem;
            color: var(--dim);
            letter-spacing: 0.05em;
        }

        footer span {
            opacity: 0.4;
        }
    </style>
</head>
<body>

    <header>
        <div class="mark">
            <svg width="100%" height="100%" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <style>
                  @keyframes rotate-cw { from{transform:rotate(0deg);} to{transform:rotate(360deg);} }
                  @keyframes rotate-ccw { from{transform:rotate(360deg);} to{transform:rotate(0deg);} }
                  @keyframes eye-look { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-3px);} 50%{transform:translateX(3px);} 75%{transform:translateX(-3px);} }
                  @keyframes glow-pulse { 0%,100%{opacity:0.4;} 50%{opacity:0.8;} }
                  .ring-1 { animation: rotate-cw 8s linear infinite; transform-origin: 50px 50px; }
                  .ring-2 { animation: rotate-ccw 10s linear infinite; transform-origin: 50px 50px; }
                  .eye-group { animation: eye-look 4s ease-in-out infinite; }
                  .glow { animation: glow-pulse 3s ease-in-out infinite; }
                  @media (prefers-color-scheme: dark) {
                    .ring-main { stroke: #1a3a52; }
                    .ring-accent { stroke: #00d9ff; }
                  }
                </style>
              </defs>
              <g class="ring-2">
                <circle cx="50" cy="50" r="38" fill="none" stroke="#5a189a" stroke-width="7" stroke-dasharray="0 40 0 20 25 10" opacity="0.5"/>
              </g>
              <g class="ring-1">
                <circle cx="50" cy="50" r="38" fill="none" stroke="#0f4c75" stroke-width="7" stroke-dasharray="30 10 20 10 25 10" class="ring-main"/>
                <circle cx="50" cy="50" r="38" fill="none" stroke="#00d9ff" stroke-width="3.5" stroke-dasharray="30 10 20 10 25 10" opacity="0.7" class="ring-accent"/>
              </g>
              <circle cx="50" cy="50" r="39" fill="none" stroke="#00d9ff" stroke-width="0.5" opacity="0.4" class="glow"/>
              <g class="eye-group">
                <circle cx="50" cy="50" r="10" fill="#ff1744" opacity="0.2"/>
                <circle cx="50" cy="50" r="7" fill="#ff1744"/>
                <circle cx="50" cy="50" r="4" fill="#330000"/>
                <circle cx="51.5" cy="48.5" r="1.5" fill="#ffffff" opacity="0.8"/>
              </g>
            </svg>
        </div>
        <div class="org-name">Rounders</div>
    </header>

    <main>
        <p class="statement">We build modular systems and experimental tools. Currently operational.</p>

        <a href="/rta.html" class="project">
            <div class="project-header">
                <span class="project-name">Rta</span>
                <span class="project-status">Active</span>
            </div>
            <div class="project-desc">AI-assisted development ecosystem. CLI, mobile, desktop.</div>
        </a>
    </main>

    <footer>
        <a href="https://github.com/Raunderz" target="_blank" rel="noopener noreferrer" style="color: var(--dim); text-decoration: none;">GitHub</a>
        <span style="margin: 0 0.5rem; opacity: 0.3;">—</span>
        <span>Rounders, 2026</span>
    </footer>

</body>
</html>
